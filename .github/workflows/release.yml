name: Build and Release Add-on

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # ── Build native Rust DLLs (x86 + x64) ─────────────────────
  build-native:
    name: Build Native DLL (${{ matrix.arch }})
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: x86
            target: i686-pc-windows-msvc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            native/target/
          key: ${{ runner.os }}-cargo-release-${{ matrix.arch }}-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-${{ matrix.arch }}-

      - name: Run Rust tests
        working-directory: native
        run: cargo test --all

      - name: Build release DLL
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }} -p termaccess-ffi

      - name: Build release helper EXE
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }} -p termaccess-helper

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: termaccess-dll-${{ matrix.arch }}
          path: native/target/${{ matrix.target }}/release/termaccess_ffi.dll
          if-no-files-found: error

      - name: Upload helper EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: termaccess-helper-${{ matrix.arch }}
          path: native/target/${{ matrix.target }}/release/termaccess-helper.exe
          if-no-files-found: error

  # ── Build and release the NVDA addon ────────────────────────
  build-and-release:
    runs-on: ubuntu-latest
    needs: build-native

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build dependencies
        run: pip install scons markdown

      - name: Extract version from buildVars.py
        id: version
        run: |
          if [ ! -f buildVars.py ]; then
            echo "Error: buildVars.py not found" >&2
            exit 1
          fi

          VERSION=$(python3 -c "
          import re, sys
          with open('buildVars.py') as f:
              m = re.search(r'addon_version\s*=\s*[\"\\x27]([^\"\\x27]+)[\"\\x27]', f.read())
          if m:
              print(m.group(1))
          else:
              print('Error: addon_version not found in buildVars.py', file=sys.stderr)
              sys.exit(1)
          ")

          if [ $? -ne 0 ]; then
            echo "Error: Failed to extract version from buildVars.py" >&2
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.version }} does not exist"
          fi

      - name: Download native artifacts
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: termaccess-*

      - name: Place native binaries in addon
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          mkdir -p addon/lib/x64 addon/lib/x86
          cp termaccess-dll-x64/termaccess_ffi.dll addon/lib/x64/termaccess.dll
          cp termaccess-dll-x86/termaccess_ffi.dll addon/lib/x86/termaccess.dll
          cp termaccess-helper-x64/termaccess-helper.exe addon/lib/x64/termaccess-helper.exe
          cp termaccess-helper-x86/termaccess-helper.exe addon/lib/x86/termaccess-helper.exe
          echo "Native binaries placed:"
          ls -lh addon/lib/x64/ addon/lib/x86/

      - name: Build add-on
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          python3 build.py --non-interactive
          ls -lh *.nvda-addon

      - name: Generate changelog for release
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            # Extract the section for this version: skip [Unreleased], find
            # ## [VERSION], capture until the next ## [ heading.
            CHANGELOG=$(awk -v ver="$VERSION" '
              /^## \[Unreleased\]/ { next }
              /^## \[/ {
                if (found) exit
                if (index($0, "[" ver "]")) { found=1; next }
              }
              found { print }
            ' CHANGELOG.md)
            if [ -z "$CHANGELOG" ]; then
              CHANGELOG="Release version $VERSION"
            fi
          else
            CHANGELOG="Release version $VERSION"
          fi
          echo "$CHANGELOG" > changelog.txt
          echo "--- Changelog for v$VERSION ---"
          cat changelog.txt

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: changelog.txt
          draft: false
          prerelease: false
          files: |
            terminalAccess-${{ steps.version.outputs.version }}.nvda-addon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -d latest 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          git tag -a latest -m "Latest release: v${{ steps.version.outputs.version }}"
          git push origin latest

          echo "Updated 'latest' tag to point to v${{ steps.version.outputs.version }}"

      - name: Skip release (tag exists)
        if: steps.check_tag.outputs.exists == 'true'
        run: |
          echo "Release v${{ steps.version.outputs.version }} already exists. Skipping release creation."
