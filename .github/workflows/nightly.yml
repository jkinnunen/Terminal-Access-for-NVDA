name: Nightly Build

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  # ── Check for changes ──────────────────────────────────────────
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes since last nightly
        id: check_changes
        run: |
          # Get the last nightly tag if it exists
          LAST_NIGHTLY=$(git tag -l "nightly-*" | sort -V | tail -1)

          if [ -z "$LAST_NIGHTLY" ]; then
            echo "No previous nightly build found"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "Last nightly: $LAST_NIGHTLY"
            # Check if there are commits since last nightly
            CHANGES=$(git rev-list ${LAST_NIGHTLY}..HEAD --count)
            if [ "$CHANGES" -gt 0 ]; then
              echo "Found $CHANGES new commits since last nightly"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "No changes since last nightly"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi

  # ── Build native Rust DLLs (x86 + x64) ─────────────────────
  build-native:
    name: Build Native (${{ matrix.arch }})
    runs-on: windows-latest
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'

    strategy:
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: x86
            target: i686-pc-windows-msvc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            native/target/
          key: ${{ runner.os }}-cargo-nightly-${{ matrix.arch }}-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-nightly-${{ matrix.arch }}-

      - name: Run Rust tests
        working-directory: native
        run: cargo test --all

      - name: Build release DLL
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }} -p termaccess-ffi

      - name: Build release helper EXE
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }} -p termaccess-helper

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: termaccess-dll-${{ matrix.arch }}
          path: native/target/${{ matrix.target }}/release/termaccess_ffi.dll
          if-no-files-found: error

      - name: Upload helper EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: termaccess-helper-${{ matrix.arch }}
          path: native/target/${{ matrix.target }}/release/termaccess-helper.exe
          if-no-files-found: error

  # ── Build and release the nightly addon ─────────────────────
  nightly-build:
    runs-on: ubuntu-latest
    needs: [check-changes, build-native]
    if: needs.check-changes.outputs.has_changes == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version from buildVars.py
        id: version
        run: |
          VERSION=$(python3 -c "
          import re, sys
          with open('buildVars.py') as f:
              m = re.search(r'addon_version\s*=\s*[\"\\x27]([^\"\\x27]+)[\"\\x27]', f.read())
          if m:
              print(m.group(1))
          else:
              print('Error: addon_version not found in buildVars.py', file=sys.stderr)
              sys.exit(1)
          ")
          NIGHTLY_VERSION="${VERSION}-nightly.$(date +%Y%m%d)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "nightly_version=$NIGHTLY_VERSION" >> $GITHUB_OUTPUT
          echo "Nightly version: $NIGHTLY_VERSION"

      - name: Update version for nightly
        run: |
          # Temporarily modify buildVars.py for nightly version
          sed -i "s/addon_version=\"[^\"]*\"/addon_version=\"${{ steps.version.outputs.nightly_version }}\"/" buildVars.py

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: termaccess-*

      - name: Place native binaries in addon
        run: |
          mkdir -p addon/lib/x64 addon/lib/x86
          cp termaccess-dll-x64/termaccess_ffi.dll addon/lib/x64/termaccess.dll
          cp termaccess-dll-x86/termaccess_ffi.dll addon/lib/x86/termaccess.dll
          cp termaccess-helper-x64/termaccess-helper.exe addon/lib/x64/termaccess-helper.exe
          cp termaccess-helper-x86/termaccess-helper.exe addon/lib/x86/termaccess-helper.exe
          echo "Native binaries placed:"
          ls -lh addon/lib/x64/ addon/lib/x86/

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scons markdown

      - name: Build nightly add-on
        run: |
          scons
          ls -lh *.nvda-addon

      - name: Generate nightly changelog
        id: changelog
        run: |
          # Get commits since last nightly
          LAST_NIGHTLY=$(git tag -l "nightly-*" | sort -V | tail -1)
          if [ -z "$LAST_NIGHTLY" ]; then
            # Get all recent commits if no previous nightly
            COMMITS=$(git log --oneline -n 20)
          else
            COMMITS=$(git log ${LAST_NIGHTLY}..HEAD --oneline)
          fi

          # Create changelog
          echo "# Nightly Build - $(date +%Y-%m-%d)" > nightly_changelog.txt
          echo "" >> nightly_changelog.txt
          echo "⚠️ **This is an automated nightly build for testing purposes.**" >> nightly_changelog.txt
          echo "Use at your own risk. For stable releases, see the [releases page](https://github.com/${{ github.repository }}/releases)." >> nightly_changelog.txt
          echo "" >> nightly_changelog.txt
          echo "## Recent Changes" >> nightly_changelog.txt
          echo "" >> nightly_changelog.txt
          echo "$COMMITS" >> nightly_changelog.txt

          cat nightly_changelog.txt

      - name: Create nightly tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG_NAME="nightly-$(date +%Y%m%d)"
          git tag -a $TAG_NAME -m "Nightly build $(date +%Y-%m-%d)"
          git push origin $TAG_NAME

          echo "Created tag: $TAG_NAME"

      - name: Create/Update Nightly Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly-$(date +%Y%m%d)
          name: Nightly Build $(date +%Y-%m-%d)
          body_path: nightly_changelog.txt
          draft: false
          prerelease: true
          files: |
            terminalAccess-${{ steps.version.outputs.nightly_version }}.nvda-addon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Skip notification ──────────────────────────────────────────
  skip-build:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'false'
    steps:
      - name: Skip build (no changes)
        run: |
          echo "No changes detected since last nightly build. Skipping."
